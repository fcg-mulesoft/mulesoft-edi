  location: "/odataservice/odata/view/company_location_address_vw"
  customerByCompanyIdPath: "odataservice/odata/view/p21_customer_view"
  user: "odataservice/odata/view/FCG_user_company_vw"
  createCustomer: "/uiserver0/api/v2/transaction"
  reconnection:
    frequency: "3000"
    retries: "3"

#objectstore
cache:
  maxEntries: "1"
  ttlInHrs: "11"
  expIntervalInHrs: "1"

inbound:
  request: "Request Received, correlationId: "
  response: "Response Sent, correlationId: "

errorCodes:
  connectivity: "5001"
  other: "9999"

reconnection:
  frequency: "2000"
  attempts: "3"
