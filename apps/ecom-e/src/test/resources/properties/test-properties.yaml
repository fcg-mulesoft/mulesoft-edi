anypoint:
  platform:
    client_id: "a092f4b49f334ece9ea521bd8bb17230"
    config:
      analytics:
        agent:
          enabled: "true"
api:
  id: "19046972"

#listener properties
https:
  host: "0.0.0.0"
  port: "8082"
  timeout:
    connection-idle: "600000"
  private:
    port: "8092"
  connectionIdleTimeOut: "30000"
  responseBufferSize: "1024"
  responseTimeout: "40000"
  basePath: "/api/v1/*"
  keystore:
    path: "keystore.jks"
    alias: "fcg-mule-cert"

#p21Db configuration
p21Db:
 host: "local"
 port: "1443"
 user: "mulesoft"
 dbName: "FCG_Dev1"
 maxPool: "8"
 minPool: "5"
 increment: "1"
 cacheSize: "0"
 frequency: "3000"
 reconnectionAttempts: "3"
 maxWaitTime: "5"

StoredProcedure:
 lineNotesQuery: "{call FCG_sf_insert_so_linenote_sp(:orderNo,:assetId,:serialNumber,:notepadClassId,:topic,:note)}"
 orderNotesQuery: "{call FCG_sf_insert_so_hdrnote_sp(:orderNo,:notepadClassId,:topic,:note)}"
 invMasterUid: "{call FCG_Get_sf_serviceinvmastuid(:serialNo,:shipToId)}"

#P21 api
P21api:
  host: "p21-dev01api.flowcontrolgroup.com"
  port: "3443"
  username: "mulesoftint"
  truststore:
    path: "truststore.jks"
  connectionIdleTimeOut: "120000"
  connectionTimeOut: "120000"
  responseTimeout: "120000"
  contactSyncPath: "/uiserver0/api/V2/Transaction"
  customerSyncPath: "/uiserver0/api/V2/Transaction"
  customerPath: "/api/entity/customers/{customerId}"
  addressPath: "/api/entity/addresses/{addressId}"
  contactPath: "/api/entity/contacts/{contactId}"
  serviceOrderSyncPath: "/uiserver0/api/V2/Transaction"
  serviceOrderCompleteSyncPath: "/uiserver0/api/V2/Transaction"
  serviceOrderPath: "/api/service/serviceorders/{orderNo}"
  partsPath: "/api/inventory/v2/parts/{itemId}"
  pickTicketPath: "/uiserver0/api/V2/Transaction"
  putPartsPath: "/uiserver0/api/V2/Transaction"
  seviceItemsPath: "/uiserver0/api/V2/Transaction"
  pickTicketsPartsPath: "/uiserver0/api/v2/transaction/get"
  serviceOrdersTxnPath: "/api/serviceOrdersTxn/{Id}"
  shippingTxnPath: "/api/shippingTxn/pickTicket/{id}"
  laborPath: "/uiserver0/api/V2/Transaction"
  tokenPath: "/api/security/token/"
  shipToPath: "/uiserver0/api/V2/Transaction/get"
  reconnection:
    frequency: "3000"
    retries: "3"

#objectstore
cache:
  maxEntries: "1"
  ttlInHrs: "11"
  expIntervalInHrs: "1"


inbound:
  request: "Request Received, correlationId: "
  response: "Response Sent, correlationId: "

errorCodes:
  connectivity: "5001"
  other: "9999"

reconnection:
  frequency: "2000"
  attempts: "3"