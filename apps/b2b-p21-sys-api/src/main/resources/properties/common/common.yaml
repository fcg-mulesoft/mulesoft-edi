# Common COnfiguration

#Listener Configuration

http:
  protocol: "HTTP"
  host: "0.0.0.0"
  readTimeout: "30000"
  port: "8081"
  private:
    port: "8091"
  path:
    listener: "/api/*"
  
# Listener Properties
https:
  host: "0.0.0.0"
  port: "8082"
  timeout:
    connection-idle: "600000"
  connectionIdleTimeOut: "30000"
  responseBufferSize: "1024"
  responseTimeout: "40000"
  basePath: "/api/v1/*"
  private:
    port: "8092"
  keystore:
    path: "keystore.jks"
    alias: "fcg-mule-cert"

#Object Store Configuration
objectstore:
  token:
    entryTTL: "11"
    expirationInterval: "4"
    maxEntries: "2"
    
#P21 configuration
p21:
  request:
    host: "p21-dev12api.flowcontrolgroup.com"
    port: "3443"
    method:
      OData: "GET"
      transaction: "POST"
    reconnection:
      maxConcurrency:
        transaction: "15000"
        OData: "20000"
      retries: 
        transaction: "3"
        OData: "3"
      
      
#View Types

viewNames:
  purchaseOrderOutbound: "fcg_edi_po_850_outbound_export_vw"
  purchaseOrderAckInbound: "fcg_po_hdr_line_udf_vw"
  purchaseOrderInvoiceInbound: "fcg_po_hdr_line_udf_vw"