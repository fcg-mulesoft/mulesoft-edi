# Common COnfiguration

#Listener Configuration

http:
  protocol: "HTTP"
  host: "0.0.0.0"
  readTimeout: "30000"
  port: "8082"
  private:
    port: "8091"
  path:
    listener: "/api/*"
  
# Listener Properties
https:
  protocol: "HTTPS"
  host: "0.0.0.0"
  port: "8082"
  timeout:
    connection-idle: "600000"
  connectionIdleTimeOut: "30000"
  responseBufferSize: "1024"
  responseTimeout: "40000"
  basePath: "/api/v1/*"
  private:
    port: "8092"
  keystore:
    path: "keystore.jks"
    alias: "fcg-mule-cert"

#Object Store Configuration
objectstore:
  token:
    entryTTL: "11"
    expirationInterval: "4"
    maxEntries: "2"
    
#P21 configuration
p21:
  request:
    host: "p21-dev12api.flowcontrolgroup.com"
    port: "3443"
    method:
      OData: "GET"
      transaction: "POST"
      
      
#View Types
viewNames:
  purchaseOrderOutbound: "fcg_edi_po_850_outbound_export_vw"
  purchaseOrderAckInbound: "fcg_po_hdr_line_udf_vw"
  purchaseOrderInvoiceInbound: "fcg_po_hdr_line_udf_vw"
  coupaInvoiceOutbound: "fcg_edi_xref_vw"
  coupaInvoiceInbound: "fcg_kft_coupa_invoice_outbound_vw"
#Service Types
serviceNames:
  purchaseOrder: "PurchaseOrder"
  purchaseOrderAck: "PurchaseOrder"
  purchaseOrderInvoice: "VendorInvoice"
  purchaseOrderShipment: "PurchaseOrderShipment"
  
email:
  host: "smtp.office365.com"
  port: "587"
  username: "mulesoftalerts@fluidflow.onmicrosoft.com"
  connectionTimeout: "60"
  readTimeout: "60"
  writeTimeout: "60"
  reconnection:
    attempts: "3"
    frequency: "2000"
  supportGroups:
    mulesoft: "Mulesoft_nonprod_support@flowcontrolgroup.com"
  subject: "P21 Number Not present in Coupa Payload"
  subject1: "PO Not Present"
  

    